<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <title>Taha Elshafei | Full Stack .NET Developer</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Portfolio of Taha Elshafei - Full Stack Developer specializing in ASP.NET Core, Web API, Angular, TypeScript, and SQL Server.">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script>
    // Apply saved language before Angular boots
    (function() {
      try {
        var lang = localStorage.getItem('portfolio-lang') || 'en';
        document.documentElement.setAttribute('lang', lang);
        document.documentElement.setAttribute('dir', lang === 'ar' ? 'rtl' : 'ltr');
      } catch(e) {}
    })();
  </script>
</head>
<body>
  <app-root></app-root>
</body>
</html>
